name: Build IPA
on:
  push:
    branches: [master]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Install expo
        run: npm install expo@~50.0.14 --legacy-peer-deps
      - name: Prebuild iOS
        run: npx expo prebuild --platform ios --clean --no-install
      - name: Install CocoaPods
        run: cd ios && pod install
      - name: Build IPA
        run: |
          cd ios
          xcodebuild -workspace iosapp.xcworkspace -scheme iosapp -configuration Release -sdk iphonesimulator -derivedDataPath build CODE_SIGNING_ALLOWED=NO EXCLUDED_ARCHS=x86_64
          mkdir -p ../output
          find build -name "*.app" -exec cp -r {} ../output/ \;
      - uses: actions/upload-artifact@v4
        with:
          name: CyberKitPro-IPA
          path: output/
