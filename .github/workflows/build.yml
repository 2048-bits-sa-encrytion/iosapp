name: Build IPA
on:
  push:
    branches: [master]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Install expo
        run: npm install expo@~51.0.0 --legacy-peer-deps
      - name: Prebuild iOS
        run: npx expo prebuild --platform ios --clean --no-install
      - name: Patch Swift 6 issues
        run: |
          find node_modules/expo-apple-authentication/ios -name "*.swift" | while read file; do
            sed -i '' 's/switch error\.code {/switch error.code {\n    @unknown default: break/g' ""
            sed -i '' 's/switch credentialState {/switch credentialState {\n    @unknown default: break/g' ""
            sed -i '' 's/switch status {/switch status {\n    @unknown default: break/g' ""
          done
          find node_modules/expo-crypto/ios -name "*.swift" -exec sed -i '' 's/class LossyConversionException: Exception/class LossyConversionException: Exception, @unchecked Sendable/g' {} \;
          find node_modules/expo-crypto/ios -name "*.swift" -exec sed -i '' 's/class FailedGeneratingRandomBytesException: GenericException<OSStatus>/class FailedGeneratingRandomBytesException: GenericException<OSStatus>, @unchecked Sendable/g' {} \;
      - name: Install CocoaPods
        run: cd ios && pod install
      - name: Build IPA
        run: |
          cd ios
          xcodebuild -workspace iosapp.xcworkspace -scheme iosapp -configuration Release -sdk iphonesimulator -derivedDataPath build CODE_SIGNING_ALLOWED=NO EXCLUDED_ARCHS=x86_64
          mkdir -p ../output
          find build -name "*.app" -exec cp -r {} ../output/ \;
      - uses: actions/upload-artifact@v4
        with:
          name: CyberKitPro-IPA
          path: output/
