name: Build IPA
on:
  push:
    branches: [master]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Install expo
        run: npm install expo@~50.0.14 --legacy-peer-deps
      - name: Prebuild iOS
        run: npx expo prebuild --platform ios --clean --no-install
      - name: Patch Podfile for C++17
        run: |
          cat >> ios/Podfile << 'EOF'

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['CLANG_CXX_LANGUAGE_STANDARD'] = 'c++17'
              end
            end
          end
          EOF
      - name: Install CocoaPods
        run: cd ios && pod install
      - name: Build IPA
        run: |
          cd ios
          xcodebuild -workspace iosapp.xcworkspace -scheme iosapp -configuration Release -sdk iphonesimulator -derivedDataPath build CODE_SIGNING_ALLOWED=NO
          mkdir -p ../output
          find build -name "*.app" -exec cp -r {} ../output/ \;
      - uses: actions/upload-artifact@v4
        with:
          name: CyberKitPro-IPA
          path: output/
