name: Build IPA
on:
  push:
    branches: [master]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Update CocoaPods
        run: sudo gem install cocoapods
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Install expo
        run: npm install expo@~51.0.0 --legacy-peer-deps
      - name: Prebuild iOS
        run: npx expo prebuild --platform ios --clean --no-install
      - name: Patch Swift 6 issues
        run: |
          python3 - <<'PYEOF'
          import os
          def patch(path, replacements):
              if not os.path.exists(path): return
              for root, dirs, files in os.walk(path):
                  for f in files:
                      if not f.endswith('.swift'): continue
                      fp = os.path.join(root, f)
                      txt = open(fp).read()
                      for old, new in replacements:
                          txt = txt.replace(old, new)
                      open(fp, 'w').write(txt)
          patch('node_modules/expo-apple-authentication/ios', [
              ('switch error.code {', 'switch error.code {\n    @unknown default: break'),
              ('switch credentialState {', 'switch credentialState {\n    @unknown default: break'),
              ('switch status {', 'switch status {\n    @unknown default: break'),
          ])
          patch('node_modules/expo-crypto/ios', [
              ('class LossyConversionException: Exception', 'class LossyConversionException: Exception, @unchecked Sendable'),
              ('class FailedGeneratingRandomBytesException: GenericException<OSStatus>', 'class FailedGeneratingRandomBytesException: GenericException<OSStatus>, @unchecked Sendable'),
          ])
          print('Patched!')
          PYEOF
      - name: Install CocoaPods deps
        run: cd ios && pod install
      - name: Build IPA
        run: |
          cd ios
          xcodebuild -workspace iosapp.xcworkspace -scheme iosapp -configuration Release -sdk iphonesimulator -derivedDataPath build CODE_SIGNING_ALLOWED=NO EXCLUDED_ARCHS=x86_64
          mkdir -p ../output
          find build -name "*.app" -exec cp -r {} ../output/ \;
      - uses: actions/upload-artifact@v4
        with:
          name: CyberKitPro-IPA
          path: output/
